name: Deploy Edge Functions

on:
  push:
    branches: [ main, master ]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      functions:
        description: 'Edge functions to deploy (space-separated, empty = all)'
        required: false
        type: string
      apply_migrations:
        description: 'Apply pending database migrations'
        required: false
        type: boolean
        default: false
      supabase_pat:
        description: 'Supabase PAT (optional — paste from supabase.com/dashboard/account/tokens). Overrides the repo secret for manual deploys.'
        required: false
        type: string

env:
  SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_pat || secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy-dev:
    name: Deploy to dev project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to dev project
        env:
          SUPABASE_PROJECT_REF: qjeutitqgdsasccxfxdy
        run: |
          echo "==> Linking to dev project: $SUPABASE_PROJECT_REF"
          LINK_OK=false
          supabase link --project-ref "$SUPABASE_PROJECT_REF" 2>/dev/null && LINK_OK=true || true

          if [ "$LINK_OK" != "true" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "  PAT failed, trying DB password fallback..."
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" && LINK_OK=true || true
          fi

          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.apply_migrations }}" == "true" ]]; then
            if [ "$LINK_OK" == "true" ]; then
              echo "==> Applying pending migrations..."
              supabase db push --linked || echo "  ⚠️  db push failed (may need service_role key)"
            else
              echo "  ⚠️  Cannot apply migrations — project not linked (no valid PAT or DB password)."
            fi
          fi

          FUNCTIONS="${{ github.event.inputs.functions }}"
          if [ -z "$FUNCTIONS" ]; then
            for fn_dir in supabase/functions/*/; do
              fn=$(basename "$fn_dir")
              echo "==> Deploying $fn to dev"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            done
          else
            for fn in $FUNCTIONS; do
              echo "==> Deploying $fn to dev"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            done
          fi

      - name: Verify agent-settings on dev
        env:
          SUPABASE_PROJECT_REF: qjeutitqgdsasccxfxdy
        run: |
          echo "==> Verifying agent-settings on dev..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://$SUPABASE_PROJECT_REF.supabase.co/functions/v1/agent-settings" \
            -H "Content-Type: application/json" \
            -d '{"action":"get"}' || echo "000")
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
            echo "  ✅ Dev function is live (HTTP $STATUS)"
          elif [ "$STATUS" = "404" ]; then
            echo "  ❌ Dev function NOT found (HTTP 404)"
            exit 1
          else
            echo "  ⚠️  Unexpected status: HTTP $STATUS"
          fi

  deploy-prod:
    name: Deploy to production project
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy to production project
        env:
          SUPABASE_PROJECT_REF: nportxmsauhezjdubsma
        run: |
          echo "==> Linking to production project: $SUPABASE_PROJECT_REF"
          LINK_OK=false
          supabase link --project-ref "$SUPABASE_PROJECT_REF" 2>/dev/null && LINK_OK=true || true

          if [ "$LINK_OK" != "true" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "  PAT failed, trying DB password fallback..."
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" && LINK_OK=true || true
          fi

          if [ "$LINK_OK" != "true" ]; then
            echo "  ⚠️  Cannot link to production project via PAT or DB password."
            echo "  This means the SUPABASE_ACCESS_TOKEN secret doesn't have Management API"
            echo "  access to the production project's organization."
          fi

          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.apply_migrations }}" == "true" ]]; then
            if [ "$LINK_OK" == "true" ]; then
              echo "==> Applying pending migrations..."
              supabase db push --linked || echo "  ⚠️  db push failed (may need service_role key)"
            else
              echo "  ⚠️  Cannot apply migrations — project not linked (no valid PAT or DB password)."
            fi
          fi

          FUNCTIONS="${{ github.event.inputs.functions }}"
          if [ -z "$FUNCTIONS" ]; then
            for fn_dir in supabase/functions/*/; do
              fn=$(basename "$fn_dir")
              echo "==> Deploying $fn to production"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --use-api || true
            done
          else
            for fn in $FUNCTIONS; do
              echo "==> Deploying $fn to production"
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --use-api || true
            done
          fi

      - name: Verify agent-settings on production
        run: |
          echo "==> Verifying agent-settings on production..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://nportxmsauhezjdubsma.supabase.co/functions/v1/agent-settings" \
            -H "Content-Type: application/json" \
            -d '{"action":"get"}' || echo "000")
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
            echo "  ✅ Production function is live (HTTP $STATUS)"
          elif [ "$STATUS" = "404" ]; then
            echo "  ❌ Production function NOT found (HTTP 404)"
            echo ""
            echo "  === TO FIX THIS ==="
            echo "  The Supabase PAT (SUPABASE_ACCESS_TOKEN) lacks Management API access"
            echo "  to the production project's organization. Options:"
            echo ""
            echo "  1. Update SUPABASE_ACCESS_TOKEN in GitHub Secrets with a PAT that has"
            echo "     access to the nportxmsauhezjdubsma project's org, then re-run this workflow."
            echo ""
            echo "  2. Deploy manually via the Supabase Dashboard:"
            echo "     a. Open https://supabase.com/dashboard/project/nportxmsauhezjdubsma"
            echo "     b. Edge Functions > Create a new function > agent-settings"
            echo "     c. Paste the code from supabase/functions/agent-settings/index.ts"
            echo "     d. Set secrets: SUPABASE_URL and SUPABASE_ANON_KEY"
            echo "     e. SQL Editor > Run migration #43 and #44"
            echo ""
            echo "  3. From a machine with a valid PAT and curl, run:"
            echo "     SUPABASE_PAT=sbp_xxx make deploy-prod"
            echo ""
            echo "  For full details see: docs/deploy-agent-settings.md"
            echo ""
            exit 1
          else
            echo "  ⚠️  Unexpected status: HTTP $STATUS"
          fi
